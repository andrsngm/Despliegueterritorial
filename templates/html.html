<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resumen Semilleros Científicos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .table-total {
            background-color: #f8f9fa;
            font-weight: bold;
        }

        .text-resaltado {
            color: #0d6efd;
            font-weight: bold;
        }

        .area-text {
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .col-f {
            color: #d63384;
            font-weight: 500;
        }

        .col-m {
            color: #0dcaf0;
            font-weight: 500;
        }

        #btnGuardar {
            display: none;
            transition: 0.3s;
        }

        .modal-header-confirm {
            background-color: #198754;
            color: white;
        }

        .header-main {
            background: #212529;
            color: white;
            padding: 15px;
            border-radius: 8px 8px 0 0;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="header-main d-flex justify-content-between align-items-center shadow-sm mb-4">
            <h2 class="mb-0"><i class="bi bi-clipboard-data"></i> Conformación de grupos del Despliegue territorial 2026</h2>
            <div class="d-flex gap-2">
                <a href="/gestor_archivos" class="btn btn-warning"><i class="bi bi-folder-x"></i> Archivo Nuevo / Eliminar</a>
                <a href="/visor" class="btn btn-outline-light"><i class="bi bi-eye"></i> Ver Base de Datos</a>
            </div>
        </div>

        <form id="uploadForm" class="mb-4 p-4 border bg-white rounded shadow-sm">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Estado:</label>
                    <select name="estado" class="form-select" required>
                        <option value="" selected disabled>Seleccione...</option>
                        <option value="AMAZONAS">AMAZONAS</option>
                        <option value="ANZOATEGUI">ANZOÁTEGUI</option>
                        <option value="APURE">APURE</option>
                        <option value="ARAGUA">ARAGUA</option>
                        <option value="BARINAS">BARINAS</option>
                        <option value="BOLIVAR">BOLÍVAR</option>
                        <option value="CARABOBO">CARABOBO</option>
                        <option value="COJEDES">COJEDES</option>
                        <option value="DELTA AMACURO">DELTA AMACURO</option>
                        <option value="DISTRITO CAPITAL">DISTRITO CAPITAL</option>
                        <option value="FALCON">FALCÓN</option>
                        <option value="GUÁRICO">GUÁRICO</option>
                        <option value="LA GUAIRA">LA GUAIRA</option>
                        <option value="LARA">LARA</option>
                        <option value="MERIDA">MÉRIDA</option>
                        <option value="MIRANDA">MIRANDA</option>
                        <option value="MONAGAS">MONAGAS</option>
                        <option value="NUEVA ESPARTA">NUEVA ESPARTA</option>
                        <option value="PORTUGUESA">PORTUGUESA</option>
                        <option value="SUCRE">SUCRE</option>
                        <option value="TACHIRA">TÁCHIRA</option>
                        <option value="TRUJILLO">TRUJILLO</option>
                        <option value="YARACUY">YARACUY</option>
                        <option value="ZULIA">ZULIA</option>
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">Archivos Excel:</label>
                    <input type="file" name="archivos" class="form-control" multiple required>
                </div>
                <div class="col-md-4 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1"><i class="bi bi-search"></i> Analizar</button>
                    <button type="button" id="btnGuardar" onclick="mostrarModalConfirmacion()" class="btn btn-success flex-grow-1"><i class="bi bi-cloud-upload"></i> Guardar en BD</button>
                </div>
            </div>
        </form>

        <div class="table-responsive bg-white rounded shadow-sm">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Estado</th>
                        <th>Área Científica</th>
                        <th class="text-center">N° Grupos</th>
                        <th class="text-center">Femeninas</th>
                        <th class="text-center">Masculinos</th>
                        <th class="text-end">Total Jóvenes</th>
                    </tr>
                </thead>
                <tbody id="tablaResultados"></tbody>
                <tfoot id="tablaFooter"></tfoot>
            </table>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header modal-header-confirm">
                    <h5 class="modal-title"><i class="bi bi-check-circle"></i> Confirmar Registro</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <p class="fs-5">¿Desea guardar este resumen en la base de datos definitiva?</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" onclick="ejecutarGuardado()" class="btn btn-success px-4">Confirmar y Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let datosActuales = [];
        let modalConfirm;

        // Función para cumplir con el formato: miles con '.' y decimales con ','
        function formatoVzla(numero) {
            return new Intl.NumberFormat('de-DE').format(numero);
        }

        document.addEventListener('DOMContentLoaded', function () {
            modalConfirm = new bootstrap.Modal(document.getElementById('modalConfirmar'));
        });

        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const tbody = document.getElementById('tablaResultados');
            const tfooter = document.getElementById('tablaFooter');
            const btnG = document.getElementById('btnGuardar');
            const formData = new FormData(e.target);

            tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4"><div class="spinner-border text-primary" role="status"></div><br>Analizando...</td></tr>';
            tfooter.innerHTML = '';
            btnG.style.display = 'none';

            try {
                const res = await fetch('/procesar', { method: 'POST', body: formData });
                datosActuales = await res.json();
                tbody.innerHTML = '';

                let tG = 0, tF = 0, tM = 0, tJ = 0;

                datosActuales.forEach(fila => {
                    tG += fila.grupos;
                    tF += fila.femeninas;
                    tM += fila.masculinos;
                    tJ += fila.jovenes;

                    tbody.innerHTML += `
                            <tr>
                                <td>${fila.estado}</td>
                                <td class="area-text"><strong>${fila.area}</strong></td>
                                <td class="text-center">${fila.grupos}</td>
                                <td class="text-center col-f">${formatoVzla(fila.femeninas)}</td>
                                <td class="text-center col-m">${formatoVzla(fila.masculinos)}</td>
                                <td class="text-end text-resaltado">${formatoVzla(fila.jovenes)}</td>
                            </tr>`;
                });

                if (datosActuales.length > 0) {
                    btnG.style.display = 'inline-block';
                    tfooter.innerHTML = `
                            <tr class="table-total table-secondary">
                                <td colspan="2">TOTAL GENERAL</td>
                                <td class="text-center">${tG}</td>
                                <td class="text-center col-f">${formatoVzla(tF)}</td>
                                <td class="text-center col-m">${formatoVzla(tM)}</td>
                                <td class="text-end text-danger">${formatoVzla(tJ)}</td>
                            </tr>`;
                }
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error de conexión con el servidor.</td></tr>';
            }
        };

        function mostrarModalConfirmacion() { modalConfirm.show(); }

        async function ejecutarGuardado() {
            modalConfirm.hide();
            try {
                const res = await fetch('/guardar_definitivo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosActuales)
                });
                const result = await res.json();
                alert(result.message);
                if (result.status === 'success') {
                    document.getElementById('uploadForm').reset();
                    document.getElementById('tablaResultados').innerHTML = '';
                    document.getElementById('tablaFooter').innerHTML = '';
                    document.getElementById('btnGuardar').style.display = 'none';
                }
            } catch (err) {
                alert("Error crítico al guardar.");
            }
        }
    </script>
</body>
</html>
